<!DOCTYPE html>
<html>
<head>
  <title>Status</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>📊 Your Orders</h2>

<button class="btn" onclick="load()">Load Orders</button>

<div id="list"></div>

</div>

<script>
async function load() {
  const res = await fetch("/api/orders");
  const data = await res.json();

  list.innerHTML = data.map(o => `
    <div class="card">
      <b>${o.id}</b><br>
      Network: ${o.network}<br>
      Status: ${o.status}<br>
      Payment: ${o.paymentStatus}
    </div>
  `).join("");
}
</script>

</body>
</html>
