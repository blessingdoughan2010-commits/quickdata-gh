<!DOCTYPE html>
<html>
<head>
  <title>QuickData GH</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📡 QuickData GH</h1>

<div class="card">
  <h2>Register</h2>
  <input id="phone" placeholder="Enter phone number">
  <button onclick="register()">Get Customer ID</button>
  <p id="cid"></p>
</div>

<div class="card">
  <h2>Buy Data</h2>
  <input id="customerId" placeholder="Customer ID">
  <input id="network" placeholder="Network (MTN, Telecel, AT)">
  <input id="amount" placeholder="Amount (GH₵)">
  <button onclick="order()">Place Order</button>
  <p id="result"></p>
</div>

<script src="app.js"></script>
</body>
</html>
