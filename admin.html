<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>🔐 Admin Dashboard</h2>

<button class="btn" onclick="load()">Load Orders</button>

<div id="orders"></div>

</div>

<script>
async function load() {
  const res = await fetch("/api/orders");
  const data = await res.json();

  orders.innerHTML = data.map(o => `
    <div class="card">
      <b>${o.id}</b><br>
      ${o.status}<br>
      <button class="btn" onclick="update('${o.id}')">Mark Delivered</button>
    </div>
  `).join("");
}

async function update(id) {
  await fetch("/api/order/" + id, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ status: "delivered" })
  });

  load();
}
</script>

</body>
</html>
